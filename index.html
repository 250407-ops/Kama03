<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { padding: 10px; margin: 5px 3px; border: none; border-radius: 6px; cursor: pointer; }
        #mainBtn { background: #007bff; color: white; width: 100%; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; }
        .like-btn { background: #f8f9fa; border-radius: 20px; }
        .time { font-size: 11px; color: #999; float: right; }
    </style>
</head>
<body>

<div class="container">
    <h3>Панель управления данными</h3>

    <input type="text" id="name" placeholder="Имя профиля">
    <input type="email" id="email" placeholder="Email">
    <button id="mainBtn">Опубликовать</button>

    <!-- 🔎 ПОИСК -->
    <input type="text" id="search" placeholder="Поиск...">

    <!-- 🔘 ФИЛЬТРЫ -->
    <div>
        <button onclick="setFilter('all')">Все</button>
        <button onclick="setFilter('popular')">Популярные</button>
    </div>

    <!-- 📊 СТАТИСТИКА -->
    <div id="stats"></div>
</div>

<div id="feed"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
    getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
    serverTimestamp, updateDoc, doc, increment 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDyj2n_tIQNiJXYmlAxInDKlTmoFE4lRIc",
  authDomain: "kb-po-b3e7f.firebaseapp.com",
  projectId: "kb-po-b3e7f",
  storageBucket: "kb-po-b3e7f.firebasestorage.app",
  messagingSenderId: "867318380230",
  appId: "1:867318380230:web:726fe34e382a31fb0849c7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allData = [];
let currentFilter = "all";

// 👍 лайк
window.processLike = async (id) => {
    await updateDoc(doc(db, "requests", id), {
        likes: increment(1)
    });
};

// ➕ добавить
document.getElementById('mainBtn').onclick = async () => {
    await addDoc(collection(db, "requests"), {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        likes: 0,
        timestamp: serverTimestamp()
    });

    document.getElementById('name').value = "";
    document.getElementById('email').value = "";
};

// 🔘 фильтр
window.setFilter = (type) => {
    currentFilter = type;
    render();
};

// 🔁 realtime
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {
    allData = [];
    snapshot.forEach((docSnap) => {
        allData.push({ id: docSnap.id, ...docSnap.data() });
    });
    render();
});

// 🧠 render
function render() {
    const feed = document.getElementById('feed');
    const search = document.getElementById('search').value.toLowerCase();

    let data = [...allData];

    // 🔎 поиск
    data = data.filter(item =>
        item.name?.toLowerCase().includes(search) ||
        item.email?.toLowerCase().includes(search)
    );

    // 🔥 фильтр
    if (currentFilter === "popular") {
        data = data.filter(item => (item.likes || 0) > 0);
        data.sort((a, b) => (b.likes || 0) - (a.likes || 0));
    }

    // 📊 статистика
    document.getElementById('stats').innerHTML =
        `Всего: ${allData.length} | После фильтра: ${data.length}`;

    // 📋 вывод
    feed.innerHTML = "";

    data.forEach((item) => {
        feed.innerHTML += `
            <div class="post">
                <span class="time">
                    ${item.timestamp?.toDate().toLocaleTimeString() || '...'}
                </span>
                <b>${item.name}</b>
                <p>${item.email}</p>
                <button class="like-btn" onclick="processLike('${item.id}')">
                    👍 ${item.likes || 0}
                </button>
            </div>
        `;
    });
}

// 🔎 live поиск
document.getElementById('search').addEventListener('input', render);

</script>

</body>
</html>
